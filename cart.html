<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Furniture Store - Cart</title>
    <script src="https://cdn.tailwindcss.com/"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
<style>
    body{
        font-family: "Inter", system-ui,;
    }
    .hero-bg {
        background: linear-gradient(135deg, #0ea #3b82f6);
    }
    .nav-link {
            position: relative;
        }
    .nav-link:after{
        content: "";
        position: relative;
        width: 0;
        height: 2px;
        bottom: -2px;
        left: 0;
        background-color: #0ea5e9;
        transition: width 0.3s;
    }
    nav-link:hover:after{
        width: 100%;
    }
    
</style>
  </head>
  <body class="bg-slate-50">
    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
      <div class="max-w-7xl mx-auto px-6">
        <div class="flex justify-between items-center h-16">
          <a
            href="index.html"
            class="flex items-center gap-2 font-bold text-2xl text-slate-900"
          >
            <i class="fa-solid fa-store text-yellow-500"></i>
            <span>Furniture Store</span>
          </a>
          <div class="hidden md:flex items-center gap-8 text-sm font-medium">
            <a
              href="index.html"
              class="nav-link text-slate-700 hover:text-yellow-600"
              >Home</a
            >
            <a
              href="shop.html"
              class="nav-link text-slate-700 hover:text-yellow-600"
              >Shop</a
            >
            <a
              href="blog.html"
              class="nav-link text-slate-700 hover:text-yellow-600"
              >Blog</a
            >
            <a
              href="about.html"
              class="nav-link text-slate-700 hover:text-yellow-600"
              >About</a
            >
            <a
              href="contact.html"
              class="nav-link text-slate-700 hover:text-yellow-600"
              >Contact</a
            >
          </div>
          <div class="flex items-center gap-4">
            <a
              href="cart.html"
              class="flex items-center gap-2 hover:text-yellow-600 relative"
            >
              <i class="fa-solid fa-shopping-cart text-2xl"></i>
              <span
                id="cart-count"
                class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full"
                >0</span
              >
            </a>
            <button>
              <i class="fa-solid fa-bars"></i>
            </button>
          </div>
        </div>
      </div>
      <div id="moblie-menu"
      class="hidden md:hidden bg-white border-t px-6 py-4"
      >
    <a href="index.html" class="block py-3 text-slate-700">Home</a>
    <a href="shop.html" class="block py-3 text-slate-700">Shop</a>
    <a href="blog.html" class="block py-3 text-slate-700">Blog</a>
    <a href="about.html" class="block py-3 text-slate-700">About</a>
    <a href="contact.html" class="block py-3 text-slate-700">Contact</a>
    </div>
    </nav>
    <section class="hero-bg"></section>
    <script src="script.js"></script>

    
  </body>
</html>
